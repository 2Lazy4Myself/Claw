# Claw Configuration
# Copy this file to config/config.yaml (gitignored) and fill in your values.
# Secrets (API keys, tokens) go in .env — not here.

# ─── Telegram ────────────────────────────────────────────────────────────────
telegram:
  # Your Telegram user ID — Claw will only respond to messages from this ID.
  # Find it by messaging @userinfobot on Telegram.
  allowed_user_id: 123456789

  # Timeout in seconds for the listener to wait for a reply during a probe session.
  reply_timeout_seconds: 300

  # If set, errors and system alerts go to this chat ID (can be same as above).
  error_chat_id: 123456789

# ─── Todoist ─────────────────────────────────────────────────────────────────
todoist:
  # Which project IDs to include in briefings and probes.
  # Leave empty to include all projects.
  # Find project IDs via Todoist API or browser URL.
  include_project_ids: []

  # Tasks with these label names will be excluded from probing (but may appear in briefing).
  exclude_labels:
    - waiting
    - someday

  # Tasks overdue by fewer than this many days will not be probed.
  # Avoids probing things that are only slightly late.
  min_overdue_days_to_probe: 2

# ─── Memory ──────────────────────────────────────────────────────────────────
memory:
  # Path to the SQLite database file.
  # Use an absolute path or relative to the project root.
  db_path: "data/claw.db"

  # How many days of task history to include in Claude's context.
  # More history = better memory, higher token usage.
  task_history_days: 30

  # How many recent sessions to summarise for context.
  recent_sessions_to_include: 5

# ─── Claude ──────────────────────────────────────────────────────────────────
claude:
  # Model to use. Do not change unless you know what you're doing.
  model: "claude-sonnet-4-20250514"

  # Max tokens for briefing responses. Briefings should be concise.
  briefing_max_tokens: 400

  # Max tokens for probe conversation turns.
  probe_max_tokens: 300

  # Max tokens for the task selection call (JSON output, can be small).
  selection_max_tokens: 150

# ─── Scheduling ──────────────────────────────────────────────────────────────
schedule:
  # These are informational only — actual scheduling is done via cron.
  # See scripts/run_briefing.sh and scripts/run_probe.sh.
  briefing_time: "08:00"
  probe_time: "18:00"
  timezone: "Europe/London"

# ─── Behaviour ───────────────────────────────────────────────────────────────
behaviour:
  # Maximum number of tasks shown in the morning briefing.
  briefing_max_tasks: 4

  # If true, Claw will skip the probe if no tasks meet the probe criteria.
  # If false, it sends a short "all clear" message instead.
  skip_probe_if_nothing_to_probe: true

  # Minimum hours between probing the same task again.
  min_hours_between_same_task_probe: 48
