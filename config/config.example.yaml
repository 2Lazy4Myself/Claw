# Claw Configuration
# Copy this file to config/config.yaml (gitignored) and fill in your values.
# Secrets (API keys, tokens) go in .env — not here.

# ─── Telegram ────────────────────────────────────────────────────────────────
telegram:
  # Your Telegram user ID — Claw will only respond to messages from this ID.
  # Find it by messaging @userinfobot on Telegram.
  allowed_user_id: 123456789

  # Timeout in seconds for the listener to wait for a reply during a probe session.
  reply_timeout_seconds: 900

  # If set, errors and system alerts go to this chat ID (can be same as above).
  error_chat_id: 123456789

# ─── Todoist ─────────────────────────────────────────────────────────────────
# Claw uses sections — not due dates — as the primary time signal.
# Moving a task to a section (Today / Next 2-3 Days / This Week etc.) IS the
# planning gesture. Section IDs are hardcoded in todoist_client.py.
# See docs/DECISIONS.md ADR-006.
todoist:
  # Which project keys to include in briefings and probes.
  # Valid values: "work", "home". Both are enabled by default.
  projects:
    - work
    - home

  # Tasks overdue by fewer than this many days will not be probed.
  min_overdue_days_to_probe: 2

# ─── Memory ──────────────────────────────────────────────────────────────────
memory:
  # Path to the SQLite database file.
  # Use an absolute path or relative to the project root.
  db_path: "data/claw.db"

  # How many days of task history to include in Claude's context.
  # More history = better memory, higher token usage.
  task_history_days: 30

  # How many recent sessions to summarise for context.
  recent_sessions_to_include: 5

# ─── Claude ──────────────────────────────────────────────────────────────────
claude:
  # Model for briefing and probe conversations — where tone and empathy matter.
  model: "claude-sonnet-4-6"

  # Model for task selection and session summarisation — structured output, no creativity needed.
  # Haiku is a fraction of the cost and perfectly capable for JSON/summary tasks.
  selection_model: "claude-haiku-4-5-20251001"

  # Max tokens for briefing responses. Briefings should be concise.
  briefing_max_tokens: 400

  # Max tokens for probe conversation turns.
  probe_max_tokens: 300

  # Max tokens for the task selection call (JSON output, can be small).
  selection_max_tokens: 150

# ─── Scheduling ──────────────────────────────────────────────────────────────
schedule:
  timezone: "Europe/London"
  active_window_start: "07:00"      # earliest Claw will speak
  active_window_end: "21:00"        # latest Claw will speak
  briefing_window_end: "10:00"      # briefing only fires before this time
  min_minutes_between_sessions: 90  # cooldown between any two sessions

# ─── Behaviour ───────────────────────────────────────────────────────────────
behaviour:
  # Maximum number of tasks shown in the morning briefing.
  briefing_max_tasks: 4

  # If true, Claw will skip the probe if no tasks meet the probe criteria.
  # If false, it sends a short "all clear" message instead.
  skip_probe_if_nothing_to_probe: true

  # Minimum hours between probing the same task again.
  min_hours_between_same_task_probe: 48

  # Minimum hours between checking in on the same "Waiting For" task.
  # These change slowly — 3 days is a reasonable default.
  waiting_for_min_probe_hours: 72

  # Maximum number of tasks to probe in a single Constant Cleaning session.
  # Session ends early if the user stops responding.
  max_chain_length: 5

# ─── Goals ───────────────────────────────────────────────────────────────────
# Goals are managed in Todoist — not here.
# Create a "Goals" section in your Claw project. Each goal is a task with this
# description template (all fields optional except Why):
#
#   Why: Feel confident, lighter, more energy day to day
#   Target: 85kg
#   Current: 108kg
#   By: 2026-12-01
#   Status: Diet consistent, exercise still patchy
#
# Add a Todoist label to both the goal task and any habits/tasks it covers.
# That label is the link — Claw uses it to connect daily actions to goals.
